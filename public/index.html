<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Progetti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <header class="bg-primary text-white p-3 mb-4">
            <div class="container">
                <h1 class="h3 mb-0">Dashboard Progetti</h1>
                <p class="mb-0">Gestisci e traccia le ore dei tuoi progetti</p>
            </div>
        </header>

        <main class="container">
            <!-- Filtri e ricerca -->
            <section class="row mb-4">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-search"></i> Cerca
                        </span>
                        <input type="text" id="searchInput" class="form-control" placeholder="Cerca progetti...">
                    </div>
                </div>
                <div class="col-md-6 text-end">
                    <button class="btn btn-outline-secondary" id="refreshBtn">
                        <i class="bi bi-arrow-clockwise"></i> Aggiorna
                    </button>
                </div>
            </section>

            <!-- Indicatori caricamento -->
            <div id="loadingIndicator" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Caricamento...</span>
                </div>
                <p class="mt-2">Caricamento progetti...</p>
            </div>

            <!-- Alert errori -->
            <div id="errorAlert" class="alert alert-danger d-none" role="alert">
                <strong>Errore:</strong> <span id="errorMessage"></span>
            </div>

            <!-- Tabella progetti -->
            <section id="projectsTable" class="d-none">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col">Project No.</th>
                                <th scope="col">Descrizione</th>
                                <th scope="col">Ore Totali</th>
                                <th scope="col">Data Creazione</th>
                                <th scope="col">Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="projectsTableBody">
                            <!-- Projects will be populated here -->
                        </tbody>
                    </table>
                </div>

                <!-- Nessun risultato -->
                <div id="emptyState" class="text-center py-5 d-none">
                    <i class="bi bi-folder-x display-1 text-muted"></i>
                    <h4 class="mt-3">Nessun Progetto Trovato</h4>
                    <p class="text-muted">Non ci sono progetti da visualizzare o nessun progetto corrisponde alla tua ricerca.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
